<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#228c8c",
                        "accent-gold": "#C5A059",
                        "background-light": "#f6f8f8",
                        "background-dark": "#131f1f",
                        "brand-green": "#32CD32",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        select {
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%23228c8c' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 1rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
        }
        /* Custom Toggle Switch Style */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #32CD32;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #32CD32;
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden max-w-lg mx-auto bg-white dark:bg-slate-900 shadow-xl">
<header class="flex items-center p-4 border-b border-primary/10 justify-between sticky top-0 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md z-10">
<button class="text-primary hover:bg-primary/10 p-2 rounded-full transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center">Registrar Visita al Terreno</h2>
<div class="w-10"></div>
</header>
<main class="flex-1 p-6 space-y-8">
<!-- Simplified Section: Checkbox/Toggle -->
<section class="space-y-4">
<label class="text-slate-900 dark:text-slate-100 text-xs font-bold uppercase tracking-widest px-1 block opacity-70">1. Confirmación de Visita</label>
<div class="bg-primary/5 dark:bg-primary/10 border border-primary/10 rounded-2xl p-5 flex items-center justify-between gap-4">
<span class="text-slate-700 dark:text-slate-200 font-semibold text-lg leading-tight">¿El lead visitó el terreno?</span>
<label class="relative inline-flex items-center cursor-pointer select-none">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-14 h-8 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[4px] after:left-[4px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-brand-green"></div>
</label>
</div>
</section>
<!-- Section 2: Ubicación (Preserved) -->
<section class="space-y-4">
<label class="text-slate-900 dark:text-slate-100 text-xs font-bold uppercase tracking-widest px-1 block opacity-70">2. Ubicación</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary">location_on</span>
<select class="w-full pl-12 pr-12 py-5 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl focus:ring-2 focus:ring-primary focus:border-primary transition-all text-slate-700 dark:text-slate-200 font-medium text-lg">
<option value="">Seleccionar terreno visitado</option>
<option value="1">Lote 45 - Valle Escondido</option>
<option value="2">Sector Norte - Finca La Paz</option>
<option value="3">Predio Industrial Santa Fe</option>
<option value="4">Terreno Residencial Mirador</option>
</select>
</div>
</section>
<!-- GPS Verification (Preserved) -->
<div class="bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 rounded-2xl p-4 flex items-center gap-3">
<div class="bg-brand-green text-white rounded-full p-1.5 flex items-center justify-center">
<span class="material-symbols-outlined text-sm font-bold">check</span>
</div>
<p class="text-green-800 dark:text-green-300 text-base font-medium">Ubicación GPS verificada correctamente.</p>
</div>
<div class="pt-4">
<button class="w-full bg-brand-green hover:brightness-95 text-white font-black text-xl py-6 rounded-2xl shadow-xl shadow-brand-green/30 transform active:scale-[0.98] transition-all flex items-center justify-center gap-3">
<span class="material-symbols-outlined font-bold">save</span>
                    GUARDAR REGISTRO
                </button>
<p class="text-center text-slate-400 text-[10px] pt-6 uppercase tracking-[0.2em] font-bold">
                    Último registro: Hace 2 días
                </p>
</div>
</main>
<!-- Success Toast (Hidden by default) -->
<div class="fixed inset-x-0 bottom-0 p-4 pointer-events-none opacity-0 translate-y-4 flex justify-center">
<div class="bg-slate-900 text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-2 pointer-events-auto">
<span class="material-symbols-outlined text-green-400">check_circle</span>
<span>¡Registro guardado con éxito!</span>
</div>
</div>
</div>
</body></html>
