<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                        "success-green": "#22c55e"
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: "Public Sans", sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen text-slate-900 dark:text-slate-100">
<div class="max-w-md mx-auto min-h-screen flex flex-col bg-background-light dark:bg-background-dark">
<header class="flex items-center p-4 border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 sticky top-0 z-10">
<button class="p-2 -ml-2 text-slate-600 dark:text-slate-400">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<div class="flex-1 flex justify-center items-center">
<img alt="Logo de la inmobiliaria" class="h-8 w-auto" data-alt="Inmobiliaria company logo minimalist style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDiQyWTvVAqRirTHx9efxSQPxT8kVPlj70T5XH7E4kzYSVtBu-gRyNb24_d9G9zJv7S1Fy6DmRxUhd9jWQbnh6CmVTAzcebBe9kNbU1nC6DyuQOOvgnybkIYjTWPKs1gSoCNSIntO1rQjqqcAfS5q0pVCzrI7QA5YvS_8yc-jedxejej5qv_bp4UyudxjdaAbewUcGuPhw1Ur4cZRD2_CvXDXjKguUBbs5ac72J5j7MyoDPUtSWDyGGQt6-1-E-p8XgYLm0Sm7pB4Zk"/>
</div>
<div class="w-10"></div>
</header>
<main class="flex-1 p-6">
<div class="mb-8">
<h1 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-slate-50">Nuevo Lead</h1>
<p class="text-slate-600 dark:text-slate-400 mt-2">Completa la información para registrar un nuevo cliente potencial.</p>
</div>
<form class="space-y-6">
<div>
<label class="block text-sm font-semibold mb-2 text-slate-700 dark:text-slate-300">
                        Nombre completo
                    </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">person</span>
<input class="w-full pl-12 pr-4 py-4 rounded-xl border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-lg focus:border-primary focus:ring-0 transition-colors" placeholder="Ej. Juan Pérez" type="text"/>
</div>
</div>
<div>
<label class="block text-sm font-semibold mb-2 text-slate-700 dark:text-slate-300">
                        Correo electrónico
                    </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">mail</span>
<input class="w-full pl-12 pr-4 py-4 rounded-xl border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-lg focus:border-primary focus:ring-0 transition-colors" placeholder="ejemplo@correo.com" type="email"/>
</div>
</div>
<div>
<label class="block text-sm font-semibold mb-2 text-slate-700 dark:text-slate-300">
                        Teléfono
                    </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">call</span>
<input class="w-full pl-12 pr-4 py-4 rounded-xl border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-lg focus:border-primary focus:ring-0 transition-colors" placeholder="+54 11 1234 5678" type="tel"/>
</div>
</div>
<div>
<label class="block text-sm font-semibold mb-2 text-slate-700 dark:text-slate-300">
                        Proyecto de interés
                    </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">domain</span>
<select class="w-full pl-12 pr-4 py-4 rounded-xl border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-lg focus:border-primary focus:ring-0 appearance-none transition-colors">
<option value="">Selecciona un proyecto</option>
<option value="1">Residencial Los Olivos</option>
<option value="2">Torres del Parque</option>
<option value="3">Quinta de San José</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">expand_more</span>
</div>
</div>
<div>
<label class="block text-sm font-semibold mb-2 text-slate-700 dark:text-slate-300">
                        Ciudad
                    </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">location_on</span>
<input class="w-full pl-12 pr-4 py-4 rounded-xl border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-lg focus:border-primary focus:ring-0 transition-colors" placeholder="Ej. Buenos Aires" type="text"/>
</div>
</div>
<div class="pt-4 pb-10">
<button class="w-full bg-success-green hover:bg-success-green/90 text-white font-bold py-5 rounded-xl text-xl shadow-lg shadow-success-green/20 flex items-center justify-center gap-2 transition-transform active:scale-95" type="submit">
<span class="material-symbols-outlined">save</span>
                        Guardar Lead
                    </button>
<p class="text-center text-slate-500 text-sm mt-4">
                        Toda la información será almacenada de forma segura.
                    </p>
</div>
</form>
</main>
</div>
</body></html>
